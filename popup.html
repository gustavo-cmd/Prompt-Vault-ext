<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptVault Popup</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="logo-area">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M12 8v4"/>
        <path d="M12 16h.01"/>
      </svg>
      <h1>Prompt<span>Vault</span></h1>
    </div>
    <button id="btn-dashboard" class="icon-btn" title="Abrir Painel Completo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="9" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="15" x2="21" y2="15"/>
      </svg>
    </button>
  </header>

  <!-- Search and Navigation -->
  <section class="search-section">
    <div class="search-container">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Pesquisar prompts por título, tag ou conteúdo..." autofocus>
      <button id="btn-clear-search" class="clear-btn" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- Tags Filter -->
  <nav class="tags-nav">
    <div id="tags-container" class="tags-scroll">
      <!-- Tags pills dynamically loaded here -->
    </div>
  </nav>

  <!-- Prompt List -->
  <main class="prompts-main">
    <div id="prompts-list" class="prompts-list">
      <!-- Prompts cards dynamically loaded here -->
    </div>
  </main>

  <!-- Footer Actions -->
  <footer class="app-footer">
    <button id="btn-new-prompt" class="btn btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Criar Novo Prompt
    </button>
  </footer>

  <!-- Variable Injection Overlay (Modal) -->
  <div id="variable-overlay" class="overlay">
    <div class="overlay-card">
      <div class="overlay-header">
        <h3>Preencher Variáveis</h3>
        <p class="overlay-subtitle">Este prompt contém placeholders dinâmicos. Preencha-os antes de copiar:</p>
      </div>
      <form id="variable-form" class="overlay-form">
        <div id="variables-inputs-container" class="inputs-container">
          <!-- Dynamic inputs go here -->
        </div>
        <div class="overlay-actions">
          <button type="button" id="btn-cancel-variables" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Copiar Preenchido
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span>Prompt copiado com sucesso!</span>
  </div>

  <!-- Scripts -->
  <script src="../common/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
